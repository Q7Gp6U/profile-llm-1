<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Персональные рекомендации в попутчики</title>
  <style>
    :root {
      --bg: #f5fbff;
      --surface: rgba(255, 255, 255, 0.92);
      --text: #18323a;
      --muted: #5c7680;
      --sky: #66b7ff;
      --sky-deep: #2d8fe4;
      --pink: #f59ac7;
      --line: rgba(24, 50, 58, 0.08);
      --shadow: 0 20px 46px rgba(24, 50, 58, 0.10);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, rgba(102, 183, 255, 0.16), transparent 32%), radial-gradient(circle at left center, rgba(245, 154, 199, 0.10), transparent 28%), var(--bg);
    }
    .page { width: min(calc(100% - 32px), 1120px); margin: 0 auto; padding: 24px 0 56px; }
    .topbar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
    .close-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
      color: var(--text);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 14px 28px rgba(24, 50, 58, 0.10);
    }
    .hero {
      display: grid;
      gap: 12px;
      padding: 28px;
      border-radius: 32px;
      background: linear-gradient(145deg, rgba(255,255,255,0.96), rgba(232,246,255,0.92));
      box-shadow: var(--shadow), 0 0 40px rgba(102, 183, 255, 0.14);
      border: 1px solid rgba(45, 143, 228, 0.10);
      animation: blockReveal 0.7s ease both;
    }
    h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); line-height: 1.08; max-width: 18ch; }
    .lead { margin: 0; color: var(--muted); line-height: 1.65; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; margin-top: 24px; }
    .card { display: grid; gap: 14px; padding: 20px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); animation: blockReveal 0.8s ease both; transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 24px 46px rgba(24, 50, 58, 0.12); border-color: rgba(45, 143, 228, 0.14); }
    .head { display: flex; align-items: center; gap: 14px; }
    .avatar { width: 58px; height: 58px; border-radius: 18px; overflow: hidden; flex-shrink: 0; background: rgba(102, 183, 255, 0.12); }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .head strong { display: block; font-size: 1.02rem; margin-bottom: 4px; }
    .muted { color: var(--muted); }
    .note { margin: 0; color: var(--muted); line-height: 1.62; font-size: 0.95rem; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { padding: 8px 12px; border-radius: 999px; background: rgba(45, 143, 228, 0.08); color: var(--sky-deep); font-size: 0.88rem; font-weight: 600; }
    .action-row { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin-top: auto; }
    .interest-btn { width: 44px; height: 44px; border: 0; border-radius: 50%; cursor: pointer; font-size: 1.1rem; color: white; background: linear-gradient(135deg, var(--sky-deep), var(--pink)); box-shadow: 0 14px 28px rgba(45, 143, 228, 0.24); transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .interest-btn:hover { transform: translateY(-2px); box-shadow: 0 18px 32px rgba(45, 143, 228, 0.28); }
    .interest-btn.is-active { background: linear-gradient(135deg, #28b587, #66d6a9); }
    @keyframes blockReveal { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar"><button class="close-btn" type="button" data-close-window aria-label="Закрыть">×</button></div>
    <section class="hero">
      <h1 data-hero-title>Мы нашли попутчиков,<br />с которыми у вас совпадает ритм поездки</h1>
      <p class="lead" data-hero-lead>Подборка учитывает выбранный тип отдыха и темп поездки.</p>
    </section>
    <section class="grid" data-recommendations-grid></section>
  </main>
  <script>
    const recommendationPools = {
      'city-weekend': [
        { name: 'Елена, 29', subtitle: 'Короткие поездки по городам Европы', city: 'Лиссабон', duration: '4–5 дней', image: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=240&q=80', note: 'Любит компактные поездки с красивыми кварталами, кофе утром и прогулками без перегруза.' },
        { name: 'Артём, 30', subtitle: 'Архитектура, бары и пешие маршруты', city: 'Прага', duration: '3–4 дня', image: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=240&q=80', note: 'Собирает городские уикенды вокруг атмосферных районов, смотровых точек и местной еды.' },
        { name: 'Марина, 27', subtitle: 'Визуальные города и лёгкий ритм', city: 'Вена', duration: '4 дня', image: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=240&q=80', note: 'Любит сочетать прогулки, локальные музеи и паузы в красивых кафе без жёсткого тайминга.' }
      ],
      'calm-rest': [
        { name: 'Ольга, 33', subtitle: 'Спокойные поездки без спешки', city: 'Батуми', duration: '6 дней', image: 'https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?auto=format&fit=crop&w=240&q=80', note: 'Выбирает мягкий сценарий дня: поздний завтрак, прогулка по району и длинный вечер у моря.' },
        { name: 'Денис, 35', subtitle: 'Комфортный отдых в своём ритме', city: 'Тбилиси', duration: '5 дней', image: 'https://images.unsplash.com/photo-1504593811423-6dd665756598?auto=format&fit=crop&w=240&q=80', note: 'Ищет города, где можно проживать атмосферу постепенно и оставлять место для спонтанности.' },
        { name: 'Наталья, 31', subtitle: 'Неспешные маршруты и видовые точки', city: 'Будва', duration: '7 дней', image: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=240&q=80', note: 'Любит чередовать тихие локации, прогулки и небольшие гастро-точки без перегруженного плана.' }
      ],
      'gastro-trip': [
        { name: 'Ирина, 28', subtitle: 'Гастро-маршруты и локальные рынки', city: 'Стамбул', duration: '5–6 дней', image: 'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=240&q=80', note: 'Строит поездку вокруг завтраков, рынков, винных баров и мест, которые любят местные.' },
        { name: 'Павел, 34', subtitle: 'Еда как часть маршрута', city: 'Болонья', duration: '4 дня', image: 'https://images.unsplash.com/photo-1504257432389-52343af06ae3?auto=format&fit=crop&w=240&q=80', note: 'Любит, когда гастрономия встроена в прогулку по районам, а не превращается в список адресов.' },
        { name: 'Лиза, 26', subtitle: 'Кафе, пекарни и атмосферные ужины', city: 'Париж', duration: '5 дней', image: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=240&q=80', note: 'Подбирает поездки с красивыми завтраками, вечерними ужинами и локациями с характером.' }
      ],
      extreme: [
        { name: 'Кирилл, 29', subtitle: 'Активные поездки с драйвом', city: 'Тбилиси', duration: '6 дней', image: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=240&q=80', note: 'Любит насыщать путешествие активностями, но всё равно держит маршрут логичным и удобным.' },
        { name: 'София, 27', subtitle: 'Эмоции, виды и смена локаций', city: 'Тенерифе', duration: '7 дней', image: 'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=240&q=80', note: 'Выбирает поездки, где есть адреналин, красивые виды и возможность быстро переключаться между форматами.' },
        { name: 'Максим, 32', subtitle: 'Город + активный выезд', city: 'Барселона', duration: '5 дней', image: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=240&q=80', note: 'Любит микс из активного дня, спортивных точек и насыщенного вечера без потери ритма.' }
      ],
      trekking: [
        { name: 'Вера, 30', subtitle: 'Природные маршруты и треки', city: 'Кутаиси', duration: '6 дней', image: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=240&q=80', note: 'Собирает поездки вокруг хайкинга, видовых троп и понятной логистики между точками.' },
        { name: 'Роман, 34', subtitle: 'Походы и горные панорамы', city: 'Ереван', duration: '7 дней', image: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=240&q=80', note: 'Любит совмещать треккинг, ранние выезды и спокойное восстановление после активного дня.' },
        { name: 'Алина, 28', subtitle: 'Трекинг с комфортным темпом', city: 'Инсбрук', duration: '5 дней', image: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=240&q=80', note: 'Выбирает маршруты, где природные точки идут в удобной последовательности и без лишней суеты.' }
      ],
      combined: [
        { name: 'Юлия, 31', subtitle: 'Город, гастрономия и паузы', city: 'Рим', duration: '5 дней', image: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=240&q=80', note: 'Любит комбинировать прогулки, архитектуру и гастро-точки, чтобы поездка была насыщенной, но живой.' },
        { name: 'Никита, 29', subtitle: 'Баланс впечатлений и отдыха', city: 'Стамбул', duration: '6 дней', image: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=240&q=80', note: 'Собирает маршруты с разными сценариями дня: от прогулок и музеев до вечерних кварталов и локальных мест.' },
        { name: 'Анна, 30', subtitle: 'Разные форматы в одной поездке', city: 'Лиссабон', duration: '5 дней', image: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=240&q=80', note: 'Ценит поездки, где можно менять ритм от спокойного утра к более насыщенному дню и атмосферному вечеру.' }
      ]
    };

    const paceConfig = {
      'calm-flex': {
        label: 'Спокойный и гибкий',
        count: 2,
        tag: 'Спокойный темп',
        additions: [
          'Хорошо совпадает с мягким ритмом поездки и уважением к паузам между точками.',
          'Подходит для маршрута без спешки, с акцентом на комфорт и органичный темп.',
          'Совпадает по ожиданию от спокойного дня, где важна атмосфера, а не гонка по локациям.'
        ]
      },
      balanced: {
        label: 'Сбалансированный',
        count: 3,
        tag: 'Сбалансированный темп',
        additions: [
          'Хорошо чувствует баланс между прогулками, впечатлениями и временем на отдых.',
          'Подходит для сценария, где день насыщенный, но без перегруза и жёсткой спешки.',
          'Совпадает по ожиданию от поездки, где активности чередуются с комфортными паузами.'
        ]
      },
      intense: {
        label: 'Насыщенный',
        count: 1,
        tag: 'Насыщенный темп',
        additions: [
          'Подходит для более динамичного маршрута, где хочется вместить максимум впечатлений.',
          'Совпадает с темпом поездки, в котором важны плотный день и яркая смена локаций.',
          'Готов к активному сценарию с более насыщенным ритмом и короткими паузами.'
        ]
      }
    };

    const typeLabels = {
      'city-weekend': 'Городской уикенд',
      'calm-rest': 'Спокойный отдых',
      'gastro-trip': 'Гастрономическая поездка',
      extreme: 'Экстримальный',
      trekking: 'Трекинг',
      combined: 'Комбинированный'
    };

    const params = new URLSearchParams(window.location.search);
    const city = params.get('city') || 'Лиссабон';
    const travelType = params.get('travelType') || 'combined';
    const pace = params.get('pace') || 'balanced';
    const grid = document.querySelector('[data-recommendations-grid]');
    const heroTitle = document.querySelector('[data-hero-title]');
    const heroLead = document.querySelector('[data-hero-lead]');

    const recommendations = (recommendationPools[travelType] || recommendationPools.combined)
      .slice(0, Math.min((paceConfig[pace] || paceConfig.balanced).count, 3))
      .map((person, index) => ({
        ...person,
        city,
        note: `${person.note} ${(paceConfig[pace] || paceConfig.balanced).additions[index % (paceConfig[pace] || paceConfig.balanced).additions.length]}`,
        paceTag: (paceConfig[pace] || paceConfig.balanced).tag
      }));

    const recommendationWord = recommendations.length === 1 ? 'рекомендацию' : recommendations.length < 5 ? 'рекомендации' : 'рекомендаций';
    heroTitle.innerHTML = `Мы нашли ${recommendations.length} ${recommendationWord},<br />которые совпадают с вашим ритмом поездки`;
    heroLead.textContent = `Подборка собрана для города «${city}», формата «${typeLabels[travelType] || typeLabels.combined}» и темпа «${(paceConfig[pace] || paceConfig.balanced).label}».`;

    grid.innerHTML = recommendations.map((person) => `
      <article class="card">
        <div class="head">
          <div class="avatar"><img src="${person.image}" alt="${person.name}" /></div>
          <div>
            <strong>${person.name}</strong>
            <div class="muted">${person.subtitle}</div>
          </div>
        </div>
        <p class="note">${person.note}</p>
        <div class="tags"><span class="tag">${person.city}</span><span class="tag">${person.duration}</span><span class="tag">${person.paceTag}</span></div>
        <div class="action-row"><button class="interest-btn" type="button" data-interest-toggle aria-label="Откликнуться">✦</button></div>
      </article>
    `).join('');

    document.querySelector('[data-close-window]').addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
        return;
      }
      window.close();
    });

    document.querySelectorAll('[data-interest-toggle]').forEach((button) => {
      button.addEventListener('click', () => {
        const isActive = button.classList.toggle('is-active');
        button.textContent = isActive ? '✓' : '✦';
      });
    });
  </script>
</body>
</html>
